<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Organisation Logistique - Luxolor</title>
<script>
  if(!window.location.search.includes('fresh=')){
    window.location.replace(window.location.pathname + '?fresh=' + Date.now());
  }
</script>

<!-- OrgChart.js (MIT, gratuit) via CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@dabeng/orgchart@3.8.0/dist/css/jquery.orgchart.min.css">
<link rel="stylesheet" href="style.css?v=20260624a">
</head>
<body>

<header class="topbar">
  <div>
    <h1>Organisation du Département Logistique</h1>
    <div class="sub">Luxolor — Dépôt Central &amp; Vente en ligne</div>
  </div>
  <button id="editToggle" class="edit-toggle">Mode édition</button>
</header>

<nav class="tabs">
  <button data-tab="organigramme" class="active">Organigramme</button>
  <button data-tab="postes">Fiches de poste</button>
  <button data-tab="fonctions">Fiches de fonction</button>
</nav>

<main>

  <!-- ORGANIGRAMME -->
  <section id="organigramme" class="tab-panel active">
    <div class="toolbar">

      <!-- Thèmes couleurs -->
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="color:var(--muted);font-size:.82rem;">Thème :</span>
        <div class="theme-dot active" style="background:#1d4ed8" onclick="setOrgTheme('blue',this)" title="Bleu"></div>
        <div class="theme-dot" style="background:#15803d" onclick="setOrgTheme('green',this)" title="Vert"></div>
        <div class="theme-dot" style="background:#7c3aed" onclick="setOrgTheme('purple',this)" title="Violet"></div>
        <div class="theme-dot" style="background:#ea580c" onclick="setOrgTheme('orange',this)" title="Orange"></div>
        <div class="theme-dot" style="background:#1e293b" onclick="setOrgTheme('dark',this)" title="Sombre"></div>
      </div>

      <!-- Info édition -->
      <span id="editHint" style="color:var(--muted);font-size:.8rem;display:none;">
        ✥ Glissez les cartes · Double-clic pour éditer · Clic pour la fiche
      </span>

      <div style="display:flex;gap:8px;align-items:center;">
        <button id="addEmployeBtn" class="btn" style="display:none;">+ Ajouter un employé</button>
        <button id="exportBtn" class="btn secondary">Exporter data.js</button>
        <button id="resetBtn" class="btn secondary">Réinitialiser</button>
      </div>
    </div>

    <!-- Conteneur OrgChart.js -->
    <div id="org-wrap">
      <div id="orgTreeContainer"></div>
    </div>
  </section>

  <!-- FICHES DE POSTE -->
  <section id="postes" class="tab-panel">
    <div class="toolbar">
      <input id="posteSearch" class="search-input" placeholder="Rechercher un poste...">
      <button id="addPosteBtn" class="btn" style="display:none;">+ Nouvelle fiche de poste</button>
    </div>
    <div id="postesGrid" class="grid"></div>
  </section>

  <!-- FICHES DE FONCTION -->
  <section id="fonctions" class="tab-panel">
    <div class="toolbar">
      <input id="fonctionSearch" class="search-input" placeholder="Rechercher une fonction...">
      <button id="addFonctionBtn" class="btn" style="display:none;">+ Nouvelle fiche de fonction</button>
    </div>
    <div id="fonctionsGrid" class="grid"></div>
  </section>

</main>

<!-- ===== MODALS ===== -->
<div class="modal-overlay" id="employeDetailModal">
  <div class="modal">
    <button class="close-btn">✕</button>
    <div id="employeDetailBody"></div>
    <div class="modal-actions" id="employeDetailActions"></div>
  </div>
</div>

<div class="modal-overlay" id="employeFormModal">
  <div class="modal">
    <button class="close-btn">✕</button>
    <div id="employeFormBody"></div>
  </div>
</div>

<div class="modal-overlay" id="posteDetailModal">
  <div class="modal">
    <button class="close-btn">✕</button>
    <div id="posteDetailBody"></div>
    <div class="modal-actions" id="posteDetailActions"></div>
  </div>
</div>

<div class="modal-overlay" id="posteFormModal">
  <div class="modal">
    <button class="close-btn">✕</button>
    <div id="posteFormBody"></div>
  </div>
</div>

<div class="modal-overlay" id="fonctionDetailModal">
  <div class="modal">
    <button class="close-btn">✕</button>
    <div id="fonctionDetailBody"></div>
    <div class="modal-actions" id="fonctionDetailActions"></div>
  </div>
</div>

<div class="modal-overlay" id="fonctionFormModal">
  <div class="modal">
    <button class="close-btn">✕</button>
    <div id="fonctionFormBody"></div>
  </div>
</div>

<!-- jQuery requis par OrgChart.js -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@dabeng/orgchart@3.8.0/dist/js/jquery.orgchart.min.js"></script>
<script src="data.js?v=20260624a"></script>
<script src="app.js?v=20260624a"></script>
</body>
</html>
